name: cd

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/636556615042/locations/global/workloadIdentityPools/githubactions/providers/github 
          service_account: github-actions@notely-490319.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: notely-490319

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build and Push to Artifact Registry
        run: |
          gcloud builds submit . \
            --tag us-central1-docker.pkg.dev/notely-490319/notely-ar-repo/notely:latest \
            --project notely-490319 \
            --no-service-account